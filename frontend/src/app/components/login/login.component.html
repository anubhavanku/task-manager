<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <div class="logo">
        <mat-icon>diversity_2</mat-icon>
        <h1>SprintFlow</h1>
      </div>
      <p class="subtitle">Sign in to your account</p>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">

        <mat-form-field appearance="outline" floatLabel="always" class="full-width">
          <mat-label>Email or Username</mat-label>
          <input matInput formControlName="identifier" placeholder="Enter email or username">
          <mat-icon matPrefix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" floatLabel="always" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'" placeholder="Enter password">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <div class="error-msg" *ngIf="error">
          <mat-icon>error_outline</mat-icon>
          {{ error }}
        </div>

        <button mat-raised-button color="primary" type="submit" class="full-width submit-btn" [disabled]="loading">
          <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          <span *ngIf="!loading">Sign In</span>
        </button>

      </form>
    </mat-card-content>

    <mat-card-footer>
      <p class="footer-text">
        Don't have an account?
        <a routerLink="/register">Create one</a>
      </p>
    </mat-card-footer>
  </mat-card>
</div>
