<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <div class="logo">
        <mat-icon>diversity_2</mat-icon>
        <h1>SprintFlow</h1>
      </div>
      <p class="subtitle">Create your account</p>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">

        <mat-form-field appearance="outline" floatLabel="always" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="fullName" placeholder="John Doe">
          <mat-icon matPrefix>badge</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" floatLabel="always" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" placeholder="johndoe">
          <mat-icon matPrefix>alternate_email</mat-icon>
          <mat-error *ngIf="form.get('username')?.hasError('minlength')">Min 3 characters</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" floatLabel="always" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" placeholder="john@example.com">
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Invalid email</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" floatLabel="always" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'" placeholder="Min 6 characters">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('minlength')">Min 6 characters</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" floatLabel="always" class="full-width">
          <mat-label>Role</mat-label>
          <mat-select formControlName="role">
            <mat-option value="MEMBER">Member</mat-option>
            <mat-option value="ADMIN">Admin</mat-option>
          </mat-select>
          <mat-icon matPrefix>manage_accounts</mat-icon>
        </mat-form-field>

        <div class="error-msg" *ngIf="error">
          <mat-icon>error_outline</mat-icon>
          {{ error }}
        </div>

        <button mat-raised-button color="primary" type="submit" class="full-width submit-btn" [disabled]="loading">
          <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          <span *ngIf="!loading">Create Account</span>
        </button>

      </form>
    </mat-card-content>

    <mat-card-footer>
      <p class="footer-text">
        Already have an account?
        <a routerLink="/login">Sign in</a>
      </p>
    </mat-card-footer>
  </mat-card>
</div>
